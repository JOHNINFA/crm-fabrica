<!DOCTYPE html>
<html>
<head>
    <title>LocalStorage Checker</title>
</head>
<body>
    <h1>LocalStorage Contents</h1>
    <pre id="output"></pre>
    <script>
        const output = document.getElementById("output");
        const keys = ["products", "productos", "categories", "syncQueue"];
        
        keys.forEach(key => {
            const value = localStorage.getItem(key);
            output.innerHTML += `<h2>${key}</h2>`;
            if (value) {
                try {
                    const parsed = JSON.parse(value);
                    output.innerHTML += JSON.stringify(parsed, null, 2);
                } catch (e) {
                    output.innerHTML += value;
                }
            } else {
                output.innerHTML += "(empty)";
            }
            output.innerHTML += "<hr>";
        });
    </script>
</body>
</html>
