<!DOCTYPE html>
<html>
<head>
    <title>LocalStorage Checker</title>
</head>
<body>
    <h1>LocalStorage Contents</h1>
    <div id="output"></div>
    <script>
        const output = document.getElementById("output");
        
        // Mostrar contenido de localStorage
        function displayLocalStorage() {
            const keys = ["products", "productos", "movimientos"];
            
            keys.forEach(key => {
                const value = localStorage.getItem(key);
                const section = document.createElement("div");
                section.innerHTML = `<h2>${key}</h2>`;
                
                if (value) {
                    try {
                        const parsed = JSON.parse(value);
                        const pre = document.createElement("pre");
                        pre.textContent = JSON.stringify(parsed, null, 2);
                        section.appendChild(pre);
                    } catch (e) {
                        section.innerHTML += `<p>Error parsing: ${e.message}</p>`;
                    }
                } else {
                    section.innerHTML += "<p>(empty)</p>";
                }
                
                output.appendChild(section);
            });
        }
        
        displayLocalStorage();
    </script>
</body>
</html>
